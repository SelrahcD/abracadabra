name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  run-tests:
    # Use MacOS so we can run VS Code (eg. https://github.com/microsoft/vscode-test/issues/230)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js environment
        uses: actions/setup-node@v3
        with:
          node-version: 22.5.1
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: yarn --immutable

      - name: Run CI Tests
        run: yarn test:ci

      - name: Build CLI
        run: yarn build:cli

      - name: CLI smoke — list
        run: node out/cli/index.js list --json | head -c 200

      - name: CLI smoke — applicable
        run: node out/cli/index.js applicable test/fixtures/cli-smoke/foo.ts:1:1 --json

      - name: CLI smoke — apply --dry-run
        run: node out/cli/index.js apply flip-if-else test/fixtures/cli-smoke/foo.ts:1:1 --dry-run
